name: Daily NCAAB Predictions

on:
  schedule:
    - cron: '0 19 * * 1-5'   # Mon-Fri 3pm EDT (19:00 UTC)
    - cron: '0 14 * * 0,6'   # Sat-Sun 10am EDT (14:00 UTC)
    # Note: GitHub Actions uses UTC. 19:00 UTC = 3pm EDT; 14:00 UTC = 10am EDT.
    # Off by 1hr during EST months (Nov–Mar) — acceptable for this season.
  workflow_dispatch:         # manual trigger from GitHub Actions UI

permissions:
  contents: write            # needed to commit predictions_latest.json back to repo

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 75          # kill job if it exceeds 75 min (protects free tier budget)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine training day
        id: training_check
        run: |
          DAY=$(date -u +%-d)
          if [ $(( DAY % 2 )) -eq 1 ]; then
            echo "is_training_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_training_day=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore model cache
        uses: actions/cache/restore@v4
        with:
          path: |
            Python scripts/model_cache
            Python scripts/sentiment_features.csv
            Python scripts/efficiency_metrics.csv
            Python scripts/kenpom_ratings.csv
            Python scripts/training_df.csv
            cbs_games.csv
          key: ncaab-model-v2-${{ github.run_id }}
          restore-keys: |
            ncaab-model-v2-

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ncaab-v1

      - name: Install dependencies
        run: |
          pip install \
            feedparser \
            vaderSentiment \
            joblib \
            scikit-learn \
            xgboost \
            numpy \
            pandas \
            tensorflow-cpu \
            tabulate \
            requests \
            beautifulsoup4 \
            lxml

      - name: Step 1 — Scrape CBS training games (3 weeks ending yesterday)
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/cbs_scraper.py"

      - name: Step 2 — Collect sentiment features
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/sentiment_features.py"

      - name: Step 3 — Collect efficiency metrics
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/efficiency_metrics.py"

      - name: Step 4 — Collect KenPom ratings
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/kenpom_ratings.py"

      - name: Step 5 — Assemble training_df.csv
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/feature_assembly.py"

      - name: Step 6 — Train all 6 models
        if: steps.training_check.outputs.is_training_day == 'true'
        run: python "Python scripts/model_training.py"

      - name: Save model cache
        if: steps.training_check.outputs.is_training_day == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Python scripts/model_cache
            Python scripts/sentiment_features.csv
            Python scripts/efficiency_metrics.csv
            Python scripts/kenpom_ratings.csv
            Python scripts/training_df.csv
            cbs_games.csv
          key: ncaab-model-v2-${{ github.run_id }}

      - name: Step 7 — Generate today's predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python "Python scripts/predict_today.py" --export-json

      - name: Step 8 — Generate bracket predictions
        run: PYTHONUTF8=1 python "Python scripts/march_madness_bracket.py" --export-json --skip-refresh

      - name: Commit and push predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/predictions_latest.json
          git add website/bracket_predictions_2026.json
          git diff --staged --quiet || git commit -m "chore: update predictions $(date -u +%Y-%m-%d)"
          git push
